<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up | AI Website Analyzer</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="auth.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">
            <i class="fa-solid fa-robot"></i>
            AI Website Analyzer
        </div>

        <h1>Create Account</h1>

        <p>
            Join AI Website Analyzer today.
        </p>

        <form id="signupForm">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Full Name"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Create Password"
                    required>

                <i class="fa-solid fa-eye toggle-password"></i>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

                <i class="fa-solid fa-eye toggle-password"></i>

            </div>

            <!-- Password Strength -->

            <div class="strength">

                <div class="strength-bar"></div>

            </div>

            <p class="strength-text">
                Password Strength
            </p>

            <!-- Terms -->

            <div class="row">

                <label>

                    <input type="checkbox" required>

                    I agree to the Terms &
                    Privacy Policy

                </label>

            </div>

            <button
                type="submit"
                class="login-btn">

                Create Account

            </button>

            <div class="divider">

                <span>OR</span>

            </div>

            <button
                type="button"
                class="social google">

                <i class="fab fa-google"></i>

                Continue with Google

            </button>

            <button
                type="button"
                class="social github">

                <i class="fab fa-github"></i>

                Continue with GitHub

            </button>

            <p class="signup-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

            <p class="home-link">

                <a href="index.html">

                    <i class="fa-solid fa-arrow-left"></i>

                    Back to Home

                </a>

            </p>

        </form>

    </div>

</div>

<script src="auth.js"></script>

</body>

</html>
